<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #2a9d8f 0%, #264653 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .card {
      text-align: center;
      color: white;
    }
    .logo-container {
      width: 280px;
      height: 280px;
      margin: 0 auto 30px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .logo-container img {
      width: 200px;
      height: 200px;
      object-fit: contain;
    }
    .company-name {
      font-size: 64px;
      font-weight: 800;
      margin-bottom: 15px;
      letter-spacing: -1px;
    }
    .tagline {
      font-size: 28px;
      font-weight: 400;
      opacity: 0.95;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-container">
      <img src="/images/logo.png" alt="LivinGreen Logo">
    </div>
    <div class="company-name">LivinGreen</div>
    <div class="tagline">Professional Cleaning Services</div>
  </div>
</body>
</html>
